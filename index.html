<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Laosvip888</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,0.75);
      padding: 12px 18px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="status">กำลังโหลด...</div>

  <iframe
    id="frame"
    src="https://hubcenter.store/la"
    allowfullscreen>
  </iframe>

  <script>
    const frame = document.getElementById("frame");
    const statusEl = document.getElementById("status");

    frame.onload = function () {
      statusEl.style.display = "none";
    };

    setTimeout(function () {
      if (statusEl.style.display !== "none") {
        statusEl.innerHTML = "โหลดไม่สำเร็จ หรือเว็บปลายทางไม่อนุญาตให้เปิดผ่าน iframe";
      }
    }, 6000);
  </script>
</body>
</html>
